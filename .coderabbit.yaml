# https://docs.coderabbit.ai/reference/configuration
language: ja-JP
early_access: false
tone_instructions: "簡潔・実用的に。スタイル選好の nit は控えめに、バグ・アクセシビリティ・パフォーマンス・セキュリティ問題を優先してください。"

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    # PR は常に draft で作るワークフローのため、draft もレビュー対象にする
    # （false だと毎回 "Review skipped: Draft detected" コメントが付く）
    drafts: true
    base_branches:
      - main
  path_filters:
    - "!images/**"
    - "!**/*.ico"
    - "!**/*.png"
    - "!**/*.webp"
    - "!**/*.jpg"
    - "!**/*.gif"
    - "!**/*.svg"

chat:
  auto_reply: true
