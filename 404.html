<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 — Takuma Kajikawa</title>
    <meta name="description" content="ページが見つかりませんでした。" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#fdfdfd" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#141414" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="stylesheet" href="./style.css" />

    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          if (stored && stored !== "system") {
            document.documentElement.setAttribute("data-theme", stored);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <main>
      <header>
        <h1>404</h1>
        <p class="lede">お探しのページは見つかりませんでした。</p>
        <p class="lede" lang="en">The page you’re looking for was not found.</p>
      </header>
      <p>
        <a href="/">トップに戻る</a>
        <span aria-hidden="true">·</span>
        <a href="/en/" lang="en">Back to top</a>
      </p>
    </main>
  </body>
</html>
