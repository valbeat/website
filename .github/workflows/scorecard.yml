name: Scorecard supply-chain security

# Runs the OpenSSF Scorecard on a schedule (and on push to main) to score
# the repo against supply-chain best practices: pinned dependencies, branch
# protection, dangerous workflows, token permissions, etc.
# Results are uploaded to:
#   1. GitHub Security tab (Code scanning) via SARIF
#   2. publish-results=true reports to the OpenSSF API so the score appears
#      on https://scorecard.dev/

on:
  branch_protection_rule:
  schedule:
    - cron: "21 9 * * 1" # Monday 09:21 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload SARIF results to the Code scanning dashboard.
      security-events: write
      # Needed for the OIDC token used by publish_results.
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF results to code-scanning dashboard
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: results.sarif

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
