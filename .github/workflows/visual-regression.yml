name: Visual Regression

on:
  # Runs on every PR (no paths filter) so this check is always reported and can
  # safely be a required status check. When the PR touches none of the visually
  # relevant paths, the job exits early as a success (see "Detect relevant
  # changes" below) instead of being skipped — a skipped required check would
  # block the PR forever.
  pull_request:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: visual-regression-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  visual:
    # Forks cannot push to visual-results branch nor comment. Skip cleanly.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          # Three-dot diff: changes on the PR head since it diverged from base.
          if git diff --name-only "${BASE_SHA}...HEAD" \
            | grep -qE '\.(html|css|js|astro)$|^src/|^public/|^astro\.config\.|^tests/|^playwright\.config\.|^package\.json$|^pnpm-lock\.yaml$|^pnpm-workspace\.yaml$|^\.npmrc$|^\.github/workflows/visual-regression\.yml$|^\.github/scripts/build-visual-comment\.js$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No visually relevant changes; the job will pass without running Playwright."
          fi

      - name: Setup pnpm
        if: steps.changes.outputs.relevant == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        if: steps.changes.outputs.relevant == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        if: steps.changes.outputs.relevant == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run visual tests
        id: playwright
        if: steps.changes.outputs.relevant == 'true'
        run: pnpm exec playwright test
        continue-on-error: true

      - name: Stage screenshots for upload
        id: stage
        if: always() && steps.changes.outputs.relevant == 'true'
        run: |
          set -euo pipefail
          STAGE="$(mktemp -d)"
          mkdir -p "$STAGE/current" "$STAGE/diff"

          if [ -d current-screenshots ]; then
            cp current-screenshots/*.png "$STAGE/current/" 2>/dev/null || true
          fi

          if [ -d test-results ]; then
            # Flatten Playwright's nested test-results paths into a single dir
            # so the comment script can reference them with stable names.
            while IFS= read -r -d '' f; do
              rel="${f#test-results/}"
              flat="${rel//\//__}"
              cp "$f" "$STAGE/diff/$flat"
            done < <(find test-results -type f -name "*.png" -print0)
          fi

          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"

      - name: Push screenshots to visual-results branch
        if: always() && steps.changes.outputs.relevant == 'true'
        env:
          STAGE: ${{ steps.stage.outputs.stage }}
          PR_NUM: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${STAGE:-}" ] || [ ! -d "${STAGE}" ]; then
            echo "No staged content; skipping push."
            exit 0
          fi
          BRANCH=visual-results
          DEST="pr-${PR_NUM}/run-${RUN_ID}"
          WORKTREE="$(mktemp -d)/visual-results"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Use a separate worktree so the main checkout (containing
          # build-visual-comment.js, playwright reports, etc.) is preserved
          # for subsequent steps.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH:$BRANCH"
            git worktree add "$WORKTREE" "$BRANCH"
          else
            # Create orphan branch via a detached worktree, portable across git versions.
            git worktree add --detach "$WORKTREE"
            (
              cd "$WORKTREE"
              git checkout --orphan "$BRANCH"
              git rm -rf . >/dev/null 2>&1 || true
              cat > README.md <<'EOF'
          # visual-results

          Auto-generated screenshots from the Visual Regression workflow.
          Each subdirectory `pr-N/run-M/` contains the screenshots for one CI run.
          Do not edit by hand.
          EOF
              git add README.md
              git commit -m "init visual-results branch"
            )
          fi

          mkdir -p "$WORKTREE/$DEST"
          cp -r "$STAGE"/. "$WORKTREE/$DEST/"

          (
            cd "$WORKTREE"
            git add "$DEST"
            if git diff --cached --quiet; then
              echo "No screenshots to commit."
            else
              git commit -m "visual results: PR #${PR_NUM} run ${RUN_ID}"
              git push origin "$BRANCH"
            fi
          )

          git worktree remove --force "$WORKTREE"

      - name: Build PR comment
        if: always() && steps.changes.outputs.relevant == 'true'
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TEST_STATUS: ${{ steps.playwright.outcome }}
        run: node .github/scripts/build-visual-comment.js

      - name: Post sticky comment
        if: always() && steps.changes.outputs.relevant == 'true'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: visual-regression
          path: comment.md

      - name: Upload Playwright report
        if: always() && steps.changes.outputs.relevant == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload raw test results
        if: always() && steps.changes.outputs.relevant == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: |
            test-results/
            current-screenshots/
          retention-days: 14
          if-no-files-found: ignore

      - name: Fail job if visual diff detected
        if: steps.playwright.outcome == 'failure'
        run: |
          echo "Visual diff detected. See the PR comment for inline previews."
          exit 1
