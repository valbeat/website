name: zizmor

# Static analysis for GitHub Actions workflows. Catches things like:
#   - unpinned action references
#   - template-injection via ${{ }} into shell
#   - excessive GITHUB_TOKEN permissions
#   - artifact poisoning patterns
# Same tool CodeRabbit already runs internally; running it ourselves makes
# the failure mode visible in CI rather than as a review-time comment.

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/workflows/zizmor.yml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
