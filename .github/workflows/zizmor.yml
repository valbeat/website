name: zizmor

# Static analysis for GitHub Actions workflows. Catches things like:
#   - unpinned action references
#   - template-injection via ${{ }} into shell
#   - excessive GITHUB_TOKEN permissions
#   - artifact poisoning patterns
# Same tool CodeRabbit already runs internally; running it ourselves makes
# the failure mode visible in CI rather than as a review-time comment.

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/workflows/zizmor.yml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"

permissions: {}

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # zizmor-action は結果を SARIF として Code Scanning にアップロードするため
      # security-events: write が必要（無いと upload-sarif が
      # "Resource not accessible by integration" で失敗する）
      security-events: write
      # upload-sarif がワークフロー実行情報を読むのに必要
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
