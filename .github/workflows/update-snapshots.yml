name: Update Visual Snapshots

# Manually re-generates the Playwright snapshot baselines for a given branch
# and commits them back. Run this from a PR branch when an intentional visual
# change is being introduced.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch (or ref) to update baselines on"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Regenerate snapshots
        run: npx playwright test --update-snapshots

      - name: Commit and push baselines
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tests/
          if git diff --cached --quiet; then
            echo "No baseline changes."
            exit 0
          fi
          git commit -m "chore: update visual regression baselines"
          git push origin "HEAD:${{ inputs.ref }}"
