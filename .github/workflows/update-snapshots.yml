name: Update Visual Snapshots

# Manually re-generates the Playwright snapshot baselines for a given branch
# and commits them back. Run this from a PR branch when an intentional visual
# change is being introduced.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch (or ref) to update baselines on"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout target ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Regenerate snapshots
        run: pnpm exec playwright test --update-snapshots

      - name: Commit and push baselines
        env:
          TARGET_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tests/
          if git diff --cached --quiet; then
            echo "No baseline changes."
            exit 0
          fi
          git commit -m "chore: update visual regression baselines"
          git push origin "HEAD:${TARGET_REF}"
