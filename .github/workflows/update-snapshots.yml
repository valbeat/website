name: Update Visual Snapshots

# Manually re-generates the Playwright snapshot baselines for the branch this
# workflow is dispatched on, and commits them back to that same branch.
#
#   gh workflow run "Update Visual Snapshots" --ref <pr-branch>
#
# The target branch is always the dispatch ref (github.ref) — there is no
# separate input, so baselines can never be pushed to an unintended branch.
# Run this from a PR branch when an intentional visual change is introduced.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Refuse to run on main
        if: github.ref_name == 'main'
        run: |
          echo "Refusing to regenerate baselines directly on main." >&2
          echo "Dispatch this workflow on a PR branch (--ref <branch>) instead." >&2
          exit 1

      - name: Checkout target ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Regenerate snapshots
        run: pnpm exec playwright test --update-snapshots

      - name: Commit and push baselines
        env:
          TARGET_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tests/
          if git diff --cached --quiet; then
            echo "No baseline changes."
            exit 0
          fi
          git commit -m "chore: update visual regression baselines"
          git push origin "HEAD:${TARGET_REF}"
