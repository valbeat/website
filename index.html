<!doctype html>

  <head>

    <meta name="theme-color" content="#fdfdfd" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#141414" media="(prefers-color-scheme: dark)" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Takuma Kajikawa" />
    <meta
      property="og:description"
      content="ソフトウェアエンジニア。VP of Technology at TechBowl, TechTrain メンター。"
    />
    <meta property="og:url" content="https://kajitack.com/" />
    <meta property="og:image" content="https://kajitack.com/images/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@kajitack" />
    <meta name="twitter:image" content="https://kajitack.com/images/og.png" />

    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="canonical" href="https://kajitack.com/" />
    <link rel="preload" as="image" href="./images/avatar.webp" type="image/webp" />
    <link rel="stylesheet" href="./style.css" />

    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          if (stored && stored !== "system") {
            document.documentElement.setAttribute("data-theme", stored);
          }
        } catch (e) {}
      })();
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Takuma Kajikawa",
        "alternateName": "梶川 琢馬",
        "url": "https://kajitack.com/",
        "image": "https://kajitack.com/images/avatar.png",
        "jobTitle": "VP of Technology",
        "worksFor": {
          "@type": "Organization",
          "name": "TechBowl",
          "url": "https://techbowl.co.jp/"
        },
        "sameAs": [
          "https://github.com/valbeat",
          "https://twitter.com/kajitack",
          "https://www.facebook.com/kajitack",
          "https://speakerdeck.com/kajitack",
          "https://zenn.dev/kajitack"
        ]
      }
    </script>
  </head>
  <body>
    <main>
      <header>
        <picture>
          <source srcset="./images/avatar.webp" type="image/webp" />
          <img
            class="avatar"
            src="./images/avatar.png"
            alt=""
            width="120"
            height="120"
          />
        </picture>
        <h1>Takuma Kajikawa</h1>
        <p class="name-ja">梶川 琢馬</p>
        <p class="lede">
          ソフトウェアエンジニア / Tokyo, Japan
        </p>
        <p class="role">
          VP of Technology @ TechBowl ・ TechTrain メンター
        </p>
      </header>

      <section>
        <h2>About</h2>
        <p>
          TechBowl で TechTrain
          （エンジニアの学びとキャリアを支えるプラットフォーム）の開発をリードしています。
          副業でメンターとしてもエンジニアの相談に乗っています。
        </p>
      </section>

      <section>
        <h2>Find me</h2>
        <ul class="link-list">
          <li><a href="https://github.com/valbeat">GitHub</a></li>
          <li><a href="https://twitter.com/kajitack">X</a></li>
          <li><a href="https://www.facebook.com/kajitack">Facebook</a></li>
          <li><a href="https://speakerdeck.com/kajitack">Speaker Deck</a></li>
          <li><a href="https://zenn.dev/kajitack">Zenn</a></li>
        </ul>
      </section>

      <footer>
        <p>&copy; 2026 Takuma Kajikawa</p>
        <p class="theme-switcher" role="group" aria-label="テーマ">
          <span aria-hidden="true">Theme:</span>
          <button type="button" data-theme-value="light" aria-pressed="false">Light</button>
          <span aria-hidden="true">·</span>
          <button type="button" data-theme-value="dark" aria-pressed="false">Dark</button>
          <span aria-hidden="true">·</span>
          <button type="button" data-theme-value="system" aria-pressed="true">Auto</button>
        </p>
      </footer>
    </main>

    <script>
      (function () {
        var buttons = document.querySelectorAll(
          ".theme-switcher [data-theme-value]"
        );
        if (!buttons.length) return;
        var current = "system";
        try {
          current = localStorage.getItem("theme") || "system";
        } catch (e) {}
        function sync(value) {
          buttons.forEach(function (btn) {
            btn.setAttribute(
              "aria-pressed",
              btn.dataset.themeValue === value ? "true" : "false"
            );
          });
        }
        sync(current);
        buttons.forEach(function (btn) {
          btn.addEventListener("click", function () {
            var value = btn.dataset.themeValue;
            try {
              if (value === "system") {
                localStorage.removeItem("theme");
                document.documentElement.removeAttribute("data-theme");
              } else {
                localStorage.setItem("theme", value);
                document.documentElement.setAttribute("data-theme", value);
              }
            } catch (e) {}
            sync(value);
          });
        });
      })();
    </script>
  </body>
</html>
